# NeoDOS — GitHub Labels
# Se crean automáticamente con: scripts/sync-roadmap.sh labels

# ── Tipo de trabajo ──────────────────────────────────────────────
- name: "type/feature"
  color: "0e8a16"
  description: "Nueva funcionalidad"
- name: "type/bug"
  color: "d73a4a"
  description: "Bug o error"
- name: "type/refactor"
  color: "ffd93d"
  description: "Refactorización de código existente"
- name: "type/cleanup"
  color: "b0e0e6"
  description: "Limpieza de código, deuda técnica"
- name: "type/docs"
  color: "1d76db"
  description: "Documentación"
- name: "type/test"
  color: "f9d0c4"
  description: "Tests o cobertura"
- name: "type/perf"
  color: "5319e7"
  description: "Rendimiento y optimización"
- name: "type/security"
  color: "b60205"
  description: "Seguridad y hardening"
- name: "type/release"
  color: "e99695"
  description: "Tareas de release"
- name: "type/tooling"
  color: "c2e0c6"
  description: "Herramientas de desarrollo y CI"
- name: "type/design"
  color: "fef2c0"
  description: "Diseño arquitectónico o propuesta"

