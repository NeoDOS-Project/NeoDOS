# ── Prioridad ────────────────────────────────────────────────────
- name: "priority/critical"
  color: "b60205"
  description: "Bloqueante para el milestone actual"
- name: "priority/high"
  color: "d93f0b"
  description: "Alta prioridad, siguiente milestone"
- name: "priority/medium"
  color: "fbca04"
  description: "Prioridad normal"
- name: "priority/low"
  color: "0e8a16"
  description: "Baja prioridad, cuando haya tiempo"
- name: "priority/experimental"
  color: "c2e0c6"
  description: "Experimental, post-1.0"

# ── Estado ───────────────────────────────────────────────────────
- name: "status/blocked"
  color: "b60205"
  description: "Bloqueado por otra issue o dependencia"
- name: "status/in-progress"
  color: "fbca04"
  description: "En desarrollo activo"
- name: "status/needs-review"
  color: "1d76db"
  description: "Pendiente de revisión"
- name: "status/needs-testing"
  color: "c5def5"
  description: "Pendiente de tests"
- name: "status/duplicate"
  color: "e6e6e6"
  description: "Duplicado de otra issue"

