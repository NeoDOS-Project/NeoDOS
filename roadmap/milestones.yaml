# NeoDOS — GitHub Milestones (Versiones)
# Se crean/actualizan automáticamente con: scripts/sync-roadmap.sh milestones
#
# due_on: fecha ISO 8601 estimada (opcional, puede omitirse)
#         Se usa para ordenar milestones en GitHub.

- title: "v0.50 — Consolidation"
  description: |
    Completar iniciativas en curso: Shell tokenizer, Power Phase 2,
    hardening de boot/init, tests de integración.
  due_on: "2026-08-01T00:00:00Z"
  state: "open"

- title: "v0.51 — NeoFS v2 + Shell Phase 2 + SAM"
  description: |
    NeoFS v2 completo (B-tree, freelist, snapshot, mkfs),
    Shell Phase 2 (line editor, history, pipes, scripting),
    SAM foundation + Network tools + Admin tools.
  due_on: "2026-09-01T00:00:00Z"
  state: "open"

- title: "v0.52 — VirtIO + Sessions + FS Security"
  description: |
    VirtIO architecture (virtqueue, net, block, 9p, input),
    Sessions (SessionManager, neologon, login flow),
    FS Security (owner_sid, permission checks, default perms),
    Power Phase 3 + Zero-copy pipes.
  due_on: "2026-10-01T00:00:00Z"
  state: "open"

- title: "v0.53 — Registry Phase 2 + Integrity + Signing"
  description: |
    Registry multi-hive, per-cell dirty tracking, ACL checking,
    Integrity levels, privilege enforcement,
    Module signing, kernel debugger, shared libraries.
  due_on: "2026-11-01T00:00:00Z"
  state: "open"

- title: "v0.54 — Power Phase 4 + User Commands + DNS"
  description: |
    Power shutdown coordination, libneodos wrappers,
    User commands (WHOAMI, PASSWD, WHO, SU, RUNAS),
    DNS resolver, kernel tracing, admin tools.
  due_on: "2026-12-01T00:00:00Z"
  state: "open"

- title: "v0.55 — WAL + Secure Boot + VFS Advanced"
  description: |
    Registry WAL (crash recovery), secure boot chain,
    VFS remaining features (DosDevices, write-back, overlay, EA, notifications, IOCP),
    Power Phase 5 polish, Font Manager.
  due_on: "2027-01-01T00:00:00Z"
  state: "open"

- title: "v0.56 — NXE/NXP Ecosystem"
  description: |
    NXE metadata auto-generation, virtual Resource namespace,
    NXE header validation, digital signatures,
    i18n migration to tr_id!(), format_str(), per-user locale.
  due_on: "2027-02-01T00:00:00Z"
  state: "open"

- title: "v0.57 — Executive Manager"
  description: |
    Configuration Manager (Registry + boot consolidation),
    Session Manager (user sessions, login/logout/switch),
    Object Namespace Manager (per-process namespace virtualization),
    Power Manager final (policies, plans, events).
  due_on: "2027-03-01T00:00:00Z"
  state: "open"

- title: "v0.58 — Official Tools"
  description: |
    NeoDev v2 complete, neocfg modules, admin tools (neomem, neotop, neotask, neolog),
    NXE tools complete (nxeinfo, nxpkg, nxdump, nxres, nxlocale, nxverify).
  due_on: "2027-04-01T00:00:00Z"
  state: "open"

- title: "v0.59 — Installation & Bootstrap"
  description: |
    install.nxe interactive installer, NeoFS creation from scratch,
