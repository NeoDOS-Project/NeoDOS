[build]
target = "x86_64-unknown-none"

[target.x86_64-unknown-none]
rustflags = [
    "-C", "link-arg=-Tkernel.ld",
    "-C", "link-arg=-melf_x86_64",
    "-C", "link-arg=-no-pie",
    "-C", "relocation-model=static",
]

[env]
# Log levels for kernel build (build.rs reads these)
LOG_DEFAULT = "INFO"
LOG_SCHED = "INFO"
LOG_SYSCALL = "INFO"
LOG_USER = "INFO"
LOG_INIT = "INFO"
LOG_KERNEL = "INFO"

[profile.dev]
panic = "abort"

[profile.release]
panic = "abort"
